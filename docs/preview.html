<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lumen Browser — UI Preview</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --toolbar-bg:          rgba(28, 28, 30, 0.97);
  --nav-bg:              rgba(36, 36, 38, 0.97);
  --tab-active-bg:       rgba(255, 255, 255, 0.25);
  --tab-hover-bg:        rgba(255, 255, 255, 0.07);
  --tab-inactive:        transparent;
  --tab-border:          rgba(255, 255, 255, 0.12);
  --glass-border:        rgba(255, 255, 255, 0.08);
  --text:                rgba(255, 255, 255, 0.88);
  --text-dim:            rgba(255, 255, 255, 0.45);
  --icon:                rgba(255, 255, 255, 0.85);
  --addr-bg:             rgba(58, 58, 60, 0.80);
  --addr-focus:          rgba(72, 72, 74, 0.95);
  --addr-ring:           rgba(10, 132, 255, 0.45);
  --btn-hover:           rgba(255, 255, 255, 0.10);
  --btn-active:          rgba(255, 255, 255, 0.16);
  --accent:              #0a84ff;
  --blur:                24px;
}

html, body {
  background: #111;
  color: var(--text);
  font-family: -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  height: 100%;
}

/* ── FAKE PAGE BEHIND TOOLBAR ────────────────────────────── */
.fake-page {
  position: fixed;
  inset: 85px 0 0 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: #1c1c1e;
  font-size: 14px;
}
.fake-page .url-display {
  font-size: 13px;
  color: #666;
  font-family: 'SF Mono', monospace;
}
.fake-fav {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #0a84ff, #30d158);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
}

/* ── TOOLBAR WRAPPER ─────────────────────────────────────── */
.toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 85px;
  z-index: 100;
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  display: flex;
  flex-direction: column;
}

/* ── TAB BAR ─────────────────────────────────────────────── */
#tab-bar {
  display: flex;
  align-items: center;
  height: 33px;
  padding: 4px 6px 0;
  gap: 2px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--glass-border);
}

.profile-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 2px 8px 2px 6px;
  border: none; border-radius: 14px;
  background: var(--tab-active-bg);
  color: var(--text);
  font-size: 12px; font-weight: 500;
  cursor: pointer; height: 26px;
  min-width: 0; flex-shrink: 0;
}
.profile-chip svg { width: 14px; height: 14px; flex-shrink: 0; }
.profile-chip .chevron { opacity: 0.5; width: 11px; height: 11px; }
.profile-chip:hover { background: var(--btn-hover); }

#tabs-scroll {
  flex: 1; overflow: hidden;
  display: flex; align-items: flex-end; height: 100%;
}
#tabs-list {
  display: flex; align-items: flex-end;
  gap: 1px; height: 100%;
}

.tab {
  display: flex; align-items: center;
  height: 29px; padding: 0 10px;
  border-radius: 6px 6px 0 0;
  background: var(--tab-inactive);
  gap: 6px;
  min-width: 100px; max-width: 210px;
  cursor: pointer;
  color: var(--text-dim);
  transition: background 0.15s, color 0.15s;
  position: relative;
}
.tab:hover { background: var(--tab-hover-bg); color: var(--text); }
.tab.active {
  background: var(--tab-active-bg);
  color: var(--text);
  border: 1px solid var(--tab-border);
  border-bottom: none;
}
.tab .fav { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; font-size: 12px; line-height: 1; }
.tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.tab-x {
  background: none; border: none; color: inherit;
  cursor: pointer; padding: 0; border-radius: 50%;
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; opacity: 0; transition: opacity 0.1s;
}
.tab:hover .tab-x { opacity: 0.55; }
.tab-x:hover { opacity: 1 !important; background: rgba(255,255,255,0.18); }

.icon-btn {
  background: none; border: none;
  color: var(--icon);
  width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
  flex-shrink: 0;
}
.icon-btn svg {
  width: 17px; height: 17px;
  stroke: currentColor; fill: none;
  stroke-width: 1.5;
  stroke-linecap: round; stroke-linejoin: round;
  opacity: 0.85;
}
.icon-btn:hover { background: var(--btn-hover); }
.icon-btn:hover svg { opacity: 1; }
.icon-btn:disabled { cursor: default; }
.icon-btn:disabled svg { opacity: 0.25; }

/* ── NAV BAR ─────────────────────────────────────────────── */
#nav-bar {
  display: flex; align-items: center;
  height: 52px; padding: 0 10px;
  background: var(--nav-bg);
  border-bottom: 1px solid var(--glass-border);
  position: relative;
}

#nav-left, #nav-right {
  display: flex; align-items: center; gap: 2px; flex-shrink: 0; z-index: 1;
}
#nav-right { margin-left: auto; }

#addr-wrap {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  width: 600px; max-width: calc(100% - 280px);
  height: 31px;
  background: var(--addr-bg);
  border-radius: 9999px;
  display: flex; align-items: center;
  padding: 0 12px; gap: 6px;
  transition: background 0.15s, box-shadow 0.15s;
  cursor: text;
}
#addr-wrap:focus-within {
  background: var(--addr-focus);
  box-shadow: 0 0 0 3px var(--addr-ring);
}
.lock-icon { opacity: 0.6; flex-shrink: 0; }
.lock-icon svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
#addr-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 14px; font-family: inherit;
  text-align: center; min-width: 0;
}
#addr-input::selection { background: rgba(10,132,255,0.30); }
#addr-input:focus { text-align: left; }

/* ── HINT BAR ────────────────────────────────────────────── */
.hint {
  position: fixed;
  bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(28,28,30,0.95);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 12px; color: var(--text-dim);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  white-space: nowrap;
  pointer-events: none;
}
.hint b { color: var(--text); }

/* ── SCREENSHOT OVERLAY ──────────────────────────────────── */
.compare-label {
  position: fixed;
  top: 92px; right: 12px;
  background: var(--accent);
  color: #fff; font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 6px;
  letter-spacing: 0.03em;
  z-index: 200;
}
</style>
</head>
<body>

<div class="fake-page">
  <div class="fake-fav">✦</div>
  <strong>google.com</strong>
  <span class="url-display">https://www.google.com</span>
</div>

<div class="compare-label">PREVIEW</div>

<div class="toolbar">
  <!-- TAB BAR -->
  <div id="tab-bar">

    <!-- Profile chip -->
    <button class="profile-chip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="3.5"/><path d="M4 20c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"/>
      </svg>
      <span>Personal</span>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </button>

    <!-- Tabs -->
    <div id="tabs-scroll"><div id="tabs-list">

      <div class="tab active">
        <span class="fav">🔍</span>
        <span class="tab-title">Google</span>
        <button class="tab-x">✕</button>
      </div>

      <div class="tab">
        <span class="fav">▶</span>
        <span class="tab-title">YouTube</span>
        <button class="tab-x">✕</button>
      </div>

      <div class="tab">
        <span class="fav">🐙</span>
        <span class="tab-title">spxmiguel/lumen-browser</span>
        <button class="tab-x">✕</button>
      </div>

      <div class="tab">
        <span class="fav">💬</span>
        <span class="tab-title">ChatGPT</span>
        <button class="tab-x">✕</button>
      </div>

    </div></div>

    <!-- New tab -->
    <button class="icon-btn" title="New Tab">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>

  </div><!-- /tab-bar -->

  <!-- NAV BAR -->
  <div id="nav-bar">

    <div id="nav-left">
      <!-- Back -->
      <button class="icon-btn" disabled title="Back">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <!-- Forward -->
      <button class="icon-btn" disabled title="Forward">
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <!-- Reader -->
      <button class="icon-btn" title="Reader View">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 12h8M8 15h5"/></svg>
      </button>
    </div>

    <!-- Address bar -->
    <div id="addr-wrap">
      <span class="lock-icon">
        <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
      </span>
      <input id="addr-input" type="text" value="google.com" spellcheck="false" autocomplete="off">
    </div>

    <div id="nav-right">
      <!-- Translate -->
      <button class="icon-btn" title="Translate">
        <svg viewBox="0 0 24 24"><path d="M5 8h14M5 12h9M5 16h6"/><path d="M16 12l3 6m-3-6l-3 6"/></svg>
      </button>
      <!-- Reload -->
      <button class="icon-btn" title="Reload">
        <svg viewBox="0 0 24 24"><path d="M4 4v5h5"/><path d="M20 20v-5h-5"/><path d="M4 9a8 8 0 0114-1.3M20 15a8 8 0 01-14 1.3"/></svg>
      </button>
      <!-- Share -->
      <button class="icon-btn" title="Share">
        <svg viewBox="0 0 24 24"><path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
      <!-- Downloads -->
      <button class="icon-btn" title="Downloads">
        <svg viewBox="0 0 24 24"><path d="M12 3v13m-4-4l4 4 4-4"/><path d="M4 20h16"/></svg>
      </button>
      <!-- Sidebar -->
      <button class="icon-btn" title="Sidebar">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <!-- Tab overview -->
      <button class="icon-btn" title="Tab Overview">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
      </button>
    </div>

  </div><!-- /nav-bar -->
</div><!-- /toolbar -->

<div class="hint">Clique na aba ativa ou na URL para testar interação — <b>compare com Safari</b></div>

<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', e => {
    if (e.target.classList.contains('tab-x')) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const titles = {
      '🔍 Google': 'google.com',
      '▶ YouTube': 'youtube.com',
      '🐙 spxmiguel/lumen-browser': 'github.com/spxmiguel/lumen-browser',
      '💬 ChatGPT': 'chatgpt.com'
    };
    const fav = tab.querySelector('.fav').textContent;
    const title = tab.querySelector('.tab-title').textContent;
    const url = titles[fav + ' ' + title] || title.toLowerCase().replace(/ /g,'.') + '.com';
    document.getElementById('addr-input').value = url;
    document.querySelector('.fake-page strong').textContent = url;
    document.querySelector('.fake-page .url-display').textContent = 'https://www.' + url;
    document.querySelector('.fake-fav').textContent = fav;
  });
});

// Address bar center/left on focus
const addrInput = document.getElementById('addr-input');
addrInput.addEventListener('focus', () => {
  addrInput.select();
});
</script>
</body>
</html>
